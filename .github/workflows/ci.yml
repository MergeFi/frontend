name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run verify:env
      - run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
      - run: npm run verify:headers
      - run: npm audit --audit-level=high
